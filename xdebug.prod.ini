; =============================================================
; Xdebug - Perfil PRODUCCIÓN
; =============================================================
; En producción Xdebug debe estar DESHABILITADO porque:
;   1. Rendimiento: ralentiza PHP hasta un 300% (overhead constante)
;   2. Seguridad: expone información interna del servidor, stack
;      traces completos y permite depuración remota no autorizada
;   3. Superficie de ataque: el puerto 9003 queda abierto
;      y cualquier cliente puede conectarse al debugger
;
; Para activar en producción (SOLO emergencias puntuales):
;   Cambiar xdebug.mode=off a xdebug.mode=debug
;   y reiniciar el contenedor. Revertir inmediatamente después.
; =============================================================

zend_extension=xdebug

; OFF desactiva Xdebug completamente (mínimo overhead posible)
xdebug.mode=off
