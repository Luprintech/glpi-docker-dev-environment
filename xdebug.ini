; =============================================================
; Xdebug - Perfil DESARROLLO
; =============================================================
; ADVERTENCIA: Este archivo NO debe usarse en producción.
; Para producción, usar xdebug.prod.ini (xdebug.mode=off).
;
; Requisitos en VS Code:
;   - Extensión: xdebug.php-debug
;   - Configuración: .vscode/launch.json (ya incluida)
;   - Puerto 9003 debe estar libre en el host
;
; Uso:
;   1. Abre VS Code con DevContainer activo
;   2. Ve a Run & Debug (Ctrl+Shift+D)
;   3. Selecciona "Escuchar Xdebug" y pulsa F5
;   4. Pon breakpoints en el código PHP y recarga la página
; =============================================================

zend_extension=xdebug

xdebug.mode=debug,develop
xdebug.start_with_request=yes
xdebug.client_port=9003
xdebug.client_host=host.docker.internal
xdebug.discover_client_host=true
xdebug.idekey=VSCODE
xdebug.log_level=0
